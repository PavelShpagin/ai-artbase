name: Deploy backend to Cloud Run

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  GCP_PROJECT_ID: aiartbase
  GCP_REGION: us-central1
  AR_REPO: aiartbase
  SERVICE: aiartbase-backend
  IMAGE: us-central1-docker.pkg.dev/aiartbase/aiartbase/aiartbase-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Enable required GCP APIs (idempotent)
        run: |
          gcloud services enable \
            run.googleapis.com \
            artifactregistry.googleapis.com \
            cloudbuild.googleapis.com

      - name: Ensure Artifact Registry repo exists
        run: |
          gcloud artifacts repositories describe ${{ env.AR_REPO }} \
            --location=${{ env.GCP_REGION }} >/dev/null 2>&1 \
          || gcloud artifacts repositories create ${{ env.AR_REPO }} \
            --repository-format=docker \
            --location=${{ env.GCP_REGION }} \
            --description="aiartbase images"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest ./backend
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Write env file for Cloud Run
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ALGORITHM: ${{ secrets.ALGORITHM }}
          ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          API_URL: ${{ secrets.API_URL }}
          OWNER_ID: ${{ secrets.OWNER_ID }}
          GCP_SA_TYPE: ${{ secrets.GCP_SA_TYPE }}
          GCP_SA_PROJECT_ID: ${{ secrets.GCP_SA_PROJECT_ID }}
          GCP_SA_PRIVATE_KEY_ID: ${{ secrets.GCP_SA_PRIVATE_KEY_ID }}
          GCP_SA_PRIVATE_KEY: ${{ secrets.GCP_SA_PRIVATE_KEY }}
          GCP_SA_CLIENT_EMAIL: ${{ secrets.GCP_SA_CLIENT_EMAIL }}
          GCP_SA_CLIENT_ID: ${{ secrets.GCP_SA_CLIENT_ID }}
          GCP_SA_AUTH_URI: ${{ secrets.GCP_SA_AUTH_URI }}
          GCP_SA_TOKEN_URI: ${{ secrets.GCP_SA_TOKEN_URI }}
          GCP_SA_AUTH_PROVIDER_URL: ${{ secrets.GCP_SA_AUTH_PROVIDER_URL }}
          GCP_SA_CLIENT_CERT_URL: ${{ secrets.GCP_SA_CLIENT_CERT_URL }}
          GCP_SA_UNIVERSE_DOMAIN: ${{ secrets.GCP_SA_UNIVERSE_DOMAIN }}
        run: |
          # YAML env file for Cloud Run --env-vars-file (handles multiline values)
          python3 - <<'PY'
          import os, yaml
          keys = [
            'DATABASE_URL','SECRET_KEY','ALGORITHM','ACCESS_TOKEN_EXPIRE_MINUTES',
            'OPENAI_API_KEY','GEMINI_API_KEY',
            'R2_ACCESS_KEY_ID','R2_SECRET_ACCESS_KEY','R2_ENDPOINT_URL','R2_BUCKET_NAME','R2_PUBLIC_URL',
            'API_URL','OWNER_ID',
            'GCP_SA_TYPE','GCP_SA_PROJECT_ID','GCP_SA_PRIVATE_KEY_ID','GCP_SA_PRIVATE_KEY',
            'GCP_SA_CLIENT_EMAIL','GCP_SA_CLIENT_ID','GCP_SA_AUTH_URI','GCP_SA_TOKEN_URI',
            'GCP_SA_AUTH_PROVIDER_URL','GCP_SA_CLIENT_CERT_URL','GCP_SA_UNIVERSE_DOMAIN',
          ]
          data = {k: os.environ.get(k, '') for k in keys}
          # Static values
          data['APP_ENV'] = 'production'
          data['DISABLE_CHROMA'] = 'true'
          data['GCP_LOCATION'] = 'us-central1'
          data['GCP_PROJECT_ID'] = 'aiartbase'
          with open('env.yaml', 'w') as f:
            yaml.safe_dump(data, f, default_flow_style=False)
          PY
          echo "Env file written ($(wc -l < env.yaml) lines, $(wc -c < env.yaml) bytes)"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8000 \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --timeout=300 \
            --env-vars-file=env.yaml

      - name: Print service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "Cloud Run URL: $URL"
          echo "## Backend deployed" >> $GITHUB_STEP_SUMMARY
          echo "URL: $URL" >> $GITHUB_STEP_SUMMARY
